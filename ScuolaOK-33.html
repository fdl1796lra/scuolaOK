<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScuolaOK!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --t:#2eaab1; --td:#1d8a91; --tl:#e8f7f8; --tm:#b2e2e5;
  --gr:#27ae60; --grb:#eafaf1;
  --or:#f5a623; --orb:#fff8ee;
  --re:#e74c3c; --reb:#fdf0ef;
  --bl:#3498db; --blb:#ebf5fb;
  --gy:#7f8c8d; --gyl:#ecf0f1; --gym:#bdc3c7;
  --tx:#2c3e50; --sb:#1a7a80;
  --sh:0 2px 12px rgba(0,0,0,.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito Sans',sans-serif; background:#f0f4f5; color:var(--tx); min-height:100vh; }
.hidden { display:none !important; }
button, input, select, textarea { font-family:inherit; }
button { cursor:pointer; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:5px; padding:8px 16px; border-radius:20px; border:none; font-weight:700; font-size:13px; transition:all .15s; white-space:nowrap; }
.bt  { background:var(--t); color:#fff; }    .bt:hover  { background:var(--td); }
.bo  { background:transparent; color:var(--t); border:2px solid var(--t); } .bo:hover { background:var(--tl); }
.br  { background:var(--re); color:#fff; }   .br:hover  { background:#c0392b; }
.bg  { background:var(--gr); color:#fff; }
.bor { background:var(--or); color:#fff; }
.bsm { padding:4px 10px; font-size:11px; border-radius:14px; }

/* LOGIN */
#LP { min-height:100vh; background:linear-gradient(135deg,#1a7a80,#2eaab1,#3fc1c9); display:flex; align-items:center; justify-content:center; padding:20px; }
.lbox { background:#fff; border-radius:20px; padding:44px 40px 36px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.2); animation:pop .3s ease; }
@keyframes pop { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.llogo { text-align:center; margin-bottom:24px; }
.lico  { width:60px; height:60px; background:linear-gradient(135deg,#2eaab1,#1d8a91); border-radius:14px; display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:10px; }
.llogo h1 { font-family:'Nunito',sans-serif; font-size:26px; font-weight:900; color:var(--td); }
.llogo p  { color:var(--gy); font-size:12px; margin-top:2px; }
.fg { margin-bottom:14px; }
.fg label { display:block; font-weight:700; font-size:12px; margin-bottom:5px; }
.fg input { width:100%; padding:11px 14px; border:2px solid var(--gyl); border-radius:9px; font-size:14px; outline:none; }
.fg input:focus { border-color:var(--t); }
.lbtn { width:100%; padding:13px; border-radius:12px; border:none; background:linear-gradient(135deg,#2eaab1,#1d8a91); color:#fff; font-size:15px; font-weight:900; cursor:pointer; transition:all .2s; margin-top:4px; }
.lbtn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(46,170,177,.4); }
.ldiv { text-align:center; color:var(--gym); font-size:12px; margin:14px 0; position:relative; }
.ldiv::before,.ldiv::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:var(--gyl); }
.ldiv::before { left:0; } .ldiv::after { right:0; }
.rbtn { width:100%; padding:11px; border-radius:12px; border:2px solid var(--t); background:transparent; color:var(--t); font-size:14px; font-weight:800; cursor:pointer; }
.rbtn:hover { background:var(--tl); }
.errb { background:var(--reb); color:var(--re); border-radius:8px; padding:9px 13px; font-size:13px; font-weight:600; margin-bottom:12px; }

/* SHELL */
#APP { display:flex; flex-direction:column; min-height:100vh; }
.ahdr { background:#fff; border-bottom:2px solid var(--tm); padding:0 22px; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(46,170,177,.08); }
.hlog { display:flex; align-items:center; gap:9px; font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; color:var(--td); }
.hlm  { width:34px; height:34px; background:linear-gradient(135deg,#2eaab1,#1d8a91); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.hsc  { font-size:11px; color:var(--gy); font-weight:600; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.husr { display:flex; align-items:center; gap:9px; font-size:13px; font-weight:700; }
.av   { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#2eaab1,#1d8a91); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:13px; }
.abody { display:flex; flex:1; }

/* SIDEBAR */
.sbar { width:68px; background:var(--sb); display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:3px; position:sticky; top:58px; height:calc(100vh - 58px); overflow-y:auto; }
.si   { width:50px; height:50px; border-radius:11px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; color:rgba(255,255,255,.65); font-size:9px; font-weight:700; gap:2px; text-align:center; border:none; background:transparent; transition:all .15s; }
.si:hover,.si.act { background:rgba(255,255,255,.18); color:#fff; }
.si .ic { font-size:20px; line-height:1; }
.sdiv { width:38px; height:1px; background:rgba(255,255,255,.2); margin:5px 0; }
.mc   { flex:1; padding:20px 24px; overflow-y:auto; min-width:0; }

/* CARD */
.card { background:#fff; border-radius:12px; box-shadow:var(--sh); overflow:hidden; }
.chdr { background:var(--t); color:#fff; padding:12px 18px; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:space-between; }

/* TABLE */
.tbl { width:100%; border-collapse:collapse; }
.tbl th { background:var(--t); color:#fff; padding:10px 12px; text-align:left; font-size:11px; font-weight:800; letter-spacing:.4px; text-transform:uppercase; white-space:nowrap; }
.tbl td { padding:9px 12px; border-bottom:1px solid var(--gyl); font-size:13px; vertical-align:middle; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tr:hover td { background:var(--tl); }
.tscr { overflow-x:auto; }

/* GRADE */
.grade { display:inline-flex; align-items:center; justify-content:center; min-width:34px; height:28px; border-radius:5px; padding:0 6px; font-weight:900; font-size:14px; font-family:'Nunito',sans-serif; }
.cg { background:var(--gr); color:#fff; }
.co { background:var(--or); color:#fff; }
.cr { background:var(--re); color:#fff; }
.cb { background:var(--bl); color:#fff; }
.ce { background:var(--gyl); color:var(--gy); }

/* VOTO CELL full-size */
.vc  { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:52px; border-radius:4px; cursor:pointer; transition:opacity .15s; gap:1px; padding:4px; }
.vc:hover { opacity:.82; }
.vcN { font-family:'Nunito',sans-serif; font-weight:900; font-size:16px; color:#fff; }
.vcS { font-size:9px; color:rgba(255,255,255,.85); }
.ve  { background:var(--gyl); border-radius:4px; width:100%; min-height:52px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.ve:hover { background:var(--tm); }

/* STAT */
.sc  { background:#fff; border-radius:12px; padding:16px 18px; box-shadow:var(--sh); border-left:4px solid var(--t); }
.sc.or { border-left-color:var(--or); } .sc.re { border-left-color:var(--re); } .sc.gr { border-left-color:var(--gr); }
.scn { font-family:'Nunito',sans-serif; font-weight:900; font-size:28px; }
.scl { font-size:11px; color:var(--gy); font-weight:700; margin-top:2px; }

/* MODAL */
.mov { position:fixed; inset:0; background:rgba(0,0,0,.48); display:flex; align-items:center; justify-content:center; z-index:999; padding:16px; animation:fi .18s; }
@keyframes fi { from{opacity:0} to{opacity:1} }
.modal { background:#fff; border-radius:16px; width:100%; max-width:600px; max-height:92vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25); animation:su .22s ease; }
.modal.mlg { max-width:860px; }
@keyframes su { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
.mhdr { background:var(--t); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-radius:16px 16px 0 0; position:sticky; top:0; z-index:10; }
.mhdr h3 { font-family:'Nunito',sans-serif; font-weight:900; font-size:15px; }
.mx   { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.25); border:none; color:#fff; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; }
.mbody { padding:20px; }
.mftr { padding:13px 20px; border-top:1px solid var(--gyl); display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; position:sticky; bottom:0; background:#fff; border-radius:0 0 16px 16px; }

/* FORM */
.fg2 { margin-bottom:14px; }
.fg2 label { display:block; font-weight:700; font-size:12px; margin-bottom:5px; }
.fg2 input,.fg2 select,.fg2 textarea { width:100%; padding:10px 12px; border:2px solid var(--gyl); border-radius:8px; font-size:13px; outline:none; color:var(--tx); }
.fg2 input:focus,.fg2 select:focus,.fg2 textarea:focus { border-color:var(--t); }
.fg2 textarea { min-height:70px; resize:vertical; }
.fr  { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fr3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

/* CLASS BAR */
.cbar { background:#fff; border-radius:12px; padding:12px 18px; display:flex; align-items:center; gap:12px; margin-bottom:16px; box-shadow:var(--sh); flex-wrap:wrap; }
.cnm  { font-family:'Nunito',sans-serif; font-weight:900; font-size:16px; }
.ctabs { display:flex; gap:4px; flex-wrap:wrap; margin-left:auto; }
.ct   { display:flex; flex-direction:column; align-items:center; padding:5px 9px; border-radius:7px; cursor:pointer; font-size:9px; font-weight:700; color:var(--t); border:none; background:transparent; transition:all .15s; gap:2px; }
.ct:hover,.ct.act { background:var(--tl); }
.ct .ci { font-size:18px; }

/* EMPTY */
.empty { background:#fff; border-radius:12px; padding:36px 24px; text-align:center; box-shadow:var(--sh); }
.empty .ei { font-size:44px; margin-bottom:10px; }
.empty h3  { font-family:'Nunito',sans-serif; font-weight:900; font-size:17px; margin-bottom:6px; }
.empty p   { color:var(--gy); font-size:13px; margin-bottom:18px; }

/* HOME CARD */
.hcc { background:#fff; border-radius:12px; padding:18px; box-shadow:var(--sh); cursor:pointer; transition:all .15s; border-left:5px solid var(--t); margin-bottom:10px; }
.hcc:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
.hcc h3 { font-family:'Nunito',sans-serif; font-weight:900; font-size:18px; color:var(--td); }

/* APPELLO */
.ab { width:32px; height:32px; border-radius:50%; border:2px solid var(--gym); background:transparent; display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:var(--gy); cursor:pointer; transition:all .15s; }
.ab.P { border-color:var(--gr); color:var(--gr); background:var(--grb); }
.ab.A { border-color:var(--re); color:var(--re); background:var(--reb); }
.ab.R { border-color:var(--or); color:var(--or); background:var(--orb); }
.ab.U { border-color:var(--bl); color:var(--bl); background:var(--blb); }
.ab.F { border-color:var(--gy); color:var(--gy); background:var(--gyl); }

/* ORARIO */
.orgrid { display:grid; gap:3px; }
.orora  { background:#fff; border-radius:5px; box-shadow:var(--sh); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:11px; color:var(--t); min-height:54px; }
.orcell { background:#fff; border-radius:5px; box-shadow:var(--sh); min-height:54px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:10px; font-weight:700; text-align:center; gap:2px; cursor:pointer; transition:all .15s; padding:4px; position:relative; }
.orcell:hover { background:var(--tl); }
.orcell.today { background:var(--tl); border:2px solid var(--t); }
.orcell.hasl  { border-left:3px solid var(--t); }
.ored { position:absolute; top:3px; right:3px; font-size:10px; opacity:0; transition:opacity .15s; }
.orcell:hover .ored { opacity:1; }

/* STUDENT PROFILE */
.sphdr { background:linear-gradient(135deg,var(--t),var(--td)); color:#fff; padding:22px; border-radius:12px 12px 0 0; text-align:center; }
.spnm  { font-family:'Nunito',sans-serif; font-weight:900; font-size:21px; }
.spst  { display:flex; gap:8px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
.spsi  { background:rgba(255,255,255,.2); border-radius:8px; padding:8px 14px; text-align:center; }
.spsn  { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; }
.spsl  { font-size:10px; opacity:.85; }

/* TABS */
.tbr { display:flex; border-bottom:2px solid var(--gyl); margin-bottom:14px; }
.tbi { padding:9px 15px; cursor:pointer; font-weight:700; font-size:12px; color:var(--gy); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .15s; }
.tbi.act { color:var(--t); border-bottom-color:var(--t); }

/* INFO BOX */
.info { background:var(--tl); border-left:4px solid var(--t); border-radius:0 8px 8px 0; padding:10px 14px; font-size:13px; margin-bottom:14px; }

/* GRIDS */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }

/* TOAST */
.toast { position:fixed; top:68px; left:50%; transform:translateX(-50%); background:var(--gr); color:#fff; padding:11px 22px; border-radius:9px; font-weight:700; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,.15); z-index:9999; animation:ta .25s ease; pointer-events:none; }
@keyframes ta { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%)} }

@media(max-width:700px) {
  .sbar{width:54px;} .si{width:42px;height:42px;}
  .g2,.g3{grid-template-columns:1fr;} .fr{grid-template-columns:1fr;}
  .mc{padding:14px;}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="LP">
  <div class="lbox">
    <div class="llogo">
      <div class="lico">📚</div>
      <h1>ScuolaOK!</h1>
      <p>Registro Elettronico per Docenti</p>
    </div>
    <div id="lerr" class="errb hidden"></div>
    <div id="LF">
      <div class="fg"><label>Nome utente</label><input type="text" id="lu" autocomplete="username"></div>
      <div class="fg"><label>Password</label><input type="password" id="lpw" autocomplete="current-password"></div>
      <button class="lbtn" onclick="doLogin()">🔓 Accedi</button>
      <div class="ldiv">oppure</div>
      <button class="rbtn" onclick="showReg()">➕ Registrati — Crea il tuo account</button>
    </div>
    <div id="RF" class="hidden">
      <div class="fg"><label>Nome completo</label><input type="text" id="rn"></div>
      <div class="fg"><label>Nome della scuola</label><input type="text" id="rs"></div>
      <div class="fg"><label>Materia principale</label><input type="text" id="rm"></div>
      <div class="fg"><label>Nome utente</label><input type="text" id="ru" autocomplete="username"></div>
      <div class="fg"><label>Password (min. 6 caratteri)</label><input type="password" id="rp" autocomplete="new-password"></div>
      <button class="lbtn" onclick="doReg()">✅ Crea Account</button>
      <div class="ldiv">oppure</div>
      <button class="rbtn" onclick="showLogin()">← Torna al Login</button>
    </div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="APP" class="hidden">
  <div class="ahdr">
    <div class="hlog"><div class="hlm">📚</div>ScuolaOK!<span class="hsc" id="hSc"></span></div>
    <div class="husr"><div class="av" id="hAv"></div><span id="hNm"></span>
      <button class="btn bo bsm" onclick="doLogout()" style="margin-left:8px">Esci</button>
    </div>
  </div>
  <div class="abody">
    <div class="sbar">
      <button class="si act" id="sb-home"      onclick="goto('home')">     <span class="ic">🏠</span>Home</button>
      <button class="si"     id="sb-registro"  onclick="goto('registro')"> <span class="ic">📋</span>Registro</button>
      <button class="si"     id="sb-scrutini"  onclick="goto('scrutini')"> <span class="ic">📊</span>Scrutini</button>
      <div class="sdiv"></div>
      <button class="si"     id="sb-bacheca"   onclick="goto('bacheca')">  <span class="ic">📌</span>Bacheca</button>
      <button class="si"     id="sb-orario"    onclick="goto('orario')">   <span class="ic">🕐</span>Orario</button>
      <button class="si"     id="sb-calendario" onclick="goto('calendario')"><span class="ic">📅</span>Calendario</button>
      <div class="sdiv"></div>
      <button class="si"     id="sb-classi"    onclick="goto('classi')">   <span class="ic">👥</span>Classi</button>
      <button class="si"     id="sb-strumenti" onclick="goto('strumenti')"><span class="ic">⚙️</span>Strumenti</button>
    </div>
    <div class="mc" id="MC"></div>
  </div>
</div>

<div id="MW"></div>
<div id="TW"></div>

<script>
// ═══════════════════════════════════════════════════
// UTILITIES — defined first so everything can use them
// ═══════════════════════════════════════════════════
function gi(id)   { return document.getElementById(id); }
function gv(id)   { const el=gi(id); return el ? el.value.trim() : ''; }
function td()     { return new Date().toISOString().split('T')[0]; }
function fmtD(iso){ if(!iso) return ''; const[y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function isoD(it) { if(!it||!it.includes('/')) return td(); const p=it.split('/'); return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }
function dSrt(a,b){ if(!a||!b) return 0; const p=s=>{const q=s.split('/');return new Date(q[2],q[1]-1,q[0]);}; return p(a)-p(b); }
function togEl(id){ const e=gi(id); if(e) e.classList.toggle('hidden'); }
function selAll(v){ document.querySelectorAll('.selA').forEach(c=>c.checked=v); }

function toast(msg, isErr){
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=isErr?'var(--re)':'var(--gr)';
  t.textContent=msg;
  gi('TW').appendChild(t);
  setTimeout(()=>t.remove(), 2800);
  saveLS();
}

// ═══════════════════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════════════════
function saveLS(){
  try { localStorage.setItem('scuolaok_v1', JSON.stringify(DB.users)); } catch(e){}
}
function loadLS(){
  try {
    const raw = localStorage.getItem('scuolaok_v1');
    if(raw) DB.users = JSON.parse(raw);
  } catch(e){}
}

// ═══════════════════════════════════════════════════
// DATABASE
// ═══════════════════════════════════════════════════
const DB = { users: [] };
loadLS(); // load persisted users immediately

function emptyData(){
  return {
    classi:[], alunni:[], programma:[], compiti:[],
    appello:[], votiOrali:[], verifiche:[], note:[],
    bacheca:[], eventi:[], orario:{}, lezioniPianificate:[]
  };
}

// ═══════════════════════════════════════════════════
// CURRENT SESSION
// ═══════════════════════════════════════════════════
let CUR  = null;   // current user object
let CCLS = null;   // current class id
let CTAB = 'giornale';

function D(){ return CUR ? CUR.data : emptyData(); }

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
function doLogin(){
  const u=gv('lu'), p=gv('lpw');
  if(!u||!p){ errL('Inserisci nome utente e password.'); return; }
  const usr = DB.users.find(x=>x.username===u && x.password===p);
  if(!usr){ errL('Credenziali non valide. Non hai un account? Clicca Registrati.'); return; }
  CUR = usr;
  if(!CUR.data) CUR.data = emptyData();
  if(!CUR.data.lezioniPianificate) CUR.data.lezioniPianificate=[];
  launch();
}

function doReg(){
  const n=gv('rn'), sc=gv('rs'), m=gv('rm'), u=gv('ru'), p=gv('rp');
  if(!n||!sc||!m||!u||!p){ errL('Compila tutti i campi.'); return; }
  if(p.length<6){ errL('La password deve avere almeno 6 caratteri.'); return; }
  if(DB.users.find(x=>x.username===u)){ errL('Nome utente già in uso.'); return; }
  const usr = { id:'u'+Date.now(), nome:n, scuola:sc, materia:m, username:u, password:p, data:emptyData() };
  DB.users.push(usr);
  saveLS();
  CUR = usr;
  launch();
}

function doLogout(){
  saveLS();
  CUR=null; CCLS=null; CTAB='giornale';
  gi('APP').classList.add('hidden');
  gi('LP').classList.remove('hidden');
  gi('lu').value=''; gi('lpw').value='';
  showLogin();
}

function errL(msg){ const e=gi('lerr'); e.textContent='⚠️ '+msg; e.classList.remove('hidden'); }
function showLogin(){ gi('LF').classList.remove('hidden'); gi('RF').classList.add('hidden'); gi('lerr').classList.add('hidden'); }
function showReg(){   gi('LF').classList.add('hidden'); gi('RF').classList.remove('hidden'); gi('lerr').classList.add('hidden'); }

function launch(){

// VOTI SYSTEM
// ═══════════════════════════════════════════════════
const VRAW=[];
for(let n=1;n<=10;n++){
  if(n>1){ VRAW.push({l:(n-1)+'½',v:(n-1)+.5}); VRAW.push({l:(n-1)+'+',v:(n-1)+.25}); }
  VRAW.push({l:''+n, v:n});
  if(n<10) VRAW.push({l:n+'-', v:n-.25});
}
const seenV=new Set();
const VOTI=VRAW.sort((a,b)=>a.v-b.v).filter(x=>{ if(x.v<1||seenV.has(x.v)) return false; seenV.add(x.v); return true; });

function vL(val){
  if(val===null||val===undefined||val==='') return '';
  if(typeof val==='string'&&isNaN(+val)) return val;
  const f=+val; if(isNaN(f)) return ''+val;
  const x=VOTI.find(v=>Math.abs(v.v-f)<.01); return x?x.l:f.toFixed(2);
}
function vV(lbl){ if(!lbl) return null; const x=VOTI.find(v=>v.l===lbl); return x?x.v:null; }
function gCls(val){
  if(val===null||val===undefined||val==='') return 'ce';
  if(typeof val==='string'&&isNaN(+val)) return 'cb';
  const n=+val; if(isNaN(n)) return 'cb';
  return n<5?'cr':n<6?'co':'cg';
}
function gHex(val){ const c=gCls(val); return c==='cr'?'#e74c3c':c==='co'?'#f5a623':c==='cg'?'#27ae60':c==='cb'?'#3498db':'#bdc3c7'; }
function rndV(n){ return Math.round(n*4)/4; }
function fmtM(n){ return (n===null||n===undefined)?'—':n.toFixed(2); }

function calcM(items){
  const ok=items.filter(x=>!x.ex&&x.p>0&&x.v!==null&&x.v!==undefined&&!isNaN(+x.v));
  if(!ok.length) return null;
  const sp=ok.reduce((s,x)=>s+x.p,0), sv=ok.reduce((s,x)=>s+(+x.v)*x.p,0);
  return sp>0?sv/sp:null;
}
function filterVotiRow(aid, raw){
  const sel=gi('vv_'+aid); if(!sel) return;
  const n=parseInt(raw,10);
  const cur=sel.value;
  if(isNaN(n)||raw.trim()===''){
    sel.innerHTML='<option value="">—</option><option value="Assente">Assente</option><option value="Esonero">Esonero</option>'+
      VOTI.map(v=>`<option value="${v.l}"${v.l===cur?' selected':''}>${v.l}</option>`).join('');
    return;
  }
  // Show exactly: n-, n, n+, n½  (values: n-0.25, n, n+0.25, n+0.5)
  const variants=VOTI.filter(v=>Math.abs(v.v-(n-0.25))<0.01||Math.abs(v.v-n)<0.01||Math.abs(v.v-(n+0.25))<0.01||Math.abs(v.v-(n+0.5))<0.01);
  sel.innerHTML='<option value="">—</option><option value="Assente">Assente</option><option value="Esonero">Esonero</option>'+
    variants.map(v=>`<option value="${v.l}"${v.l===cur?' selected':''}>${v.l}</option>`).join('');
  // auto-select exact match
  const exact=variants.find(v=>Math.abs(v.v-n)<0.01); if(exact) sel.value=exact.l;
}
function vOpts(sel='',spec=false){
  let o='<option value="">—</option>';
  if(spec){ o+=`<option value="Assente"${sel==='Assente'?' selected':''}>Assente</option>`; o+=`<option value="Esonero"${sel==='Esonero'?' selected':''}>Esonero</option>`; }
  VOTI.forEach(v=>{ o+=`<option value="${v.l}"${v.l===sel?' selected':''}>${v.l}</option>`; });
  return o;
}

function cycleStato(aid,cid,data){

function pgCal(c){
  const d=D(), oggi=new Date();
  if(!CUR._calMese) CUR._calMese={y:oggi.getFullYear(),m:oggi.getMonth()};
  const anno=CUR._calMese.y, mese=CUR._calMese.m;
  const nm=new Date(anno,mese,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  const pG=new Date(anno,mese,1).getDay(), gM=new Date(anno,mese+1,0).getDate();
  const off=pG===0?6:pG-1;
  const days=[]; for(let i=0;i<off;i++) days.push(null); for(let i=1;i<=gM;i++) days.push(i);
  c.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn bo bsm" onclick="calNav(-1)">◀</button>
      <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;text-transform:capitalize">📅 ${nm}</div>
      <button class="btn bo bsm" onclick="calNav(1)">▶</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bt" onclick="openM('addEvento')">➕ Evento Personale</button>
      ${d.classi.length?`<button class="btn bo" onclick="openM('addEventoClasse')">🏫 Evento Classe</button>`:''}
    </div>
  </div>
  <div style="display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap">
    ${[['#e85d5d','Annotazione'],['#2eaab1','Promemoria'],['#f5a623','Personale'],['#27ae60','Compiti'],['#8e44ad','Verifica Classe']].map(([col,lab])=>
      `<span style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700"><span style="width:12px;height:12px;background:${col};border-radius:3px;display:inline-block"></span>${lab}</span>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
    ${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(g=>`<div style="text-align:center;font-size:11px;font-weight:800;color:var(--t);padding:6px 0">${g}</div>`).join('')}
    ${days.map(dn=>{
      if(!dn) return '<div></div>';
      const isT=dn===oggi.getDate()&&mese===oggi.getMonth()&&anno===oggi.getFullYear();
      const evs=d.eventi.filter(e=>{ const p=e.data.split('/'); return +p[0]===dn&&+p[1]===(mese+1)&&+p[2]===anno; });
      return `<div style="min-height:70px;border-radius:8px;padding:5px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;${isT?'border:2px solid var(--t);':''}" onclick="openM('addEventoGiorno','${dn}','${mese+1}','${anno}')">
        <div style="font-size:12px;font-weight:800;${isT?'color:var(--t)':''}">
          ${isT?`<span style="background:var(--t);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center">${dn}</span>`:dn}
        </div>
        ${evs.slice(0,3).map(ev=>`<div style="font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;margin-top:2px;background:${ev.col};color:#fff;cursor:pointer" onclick="event.stopPropagation();openM('editEvento','${ev.id}')">${(ev.clsNome?'🏫 ':'')+ev.testo.substring(0,14)}</div>`).join('')}
        ${evs.length>3?`<div style="font-size:9px;color:var(--gy)">+${evs.length-3}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}
function calNav(dir){
  if(!CUR._calMese){ const oggi=new Date(); CUR._calMese={y:oggi.getFullYear(),m:oggi.getMonth()}; }
  CUR._calMese.m+=dir;
  if(CUR._calMese.m>11){CUR._calMese.m=0;CUR._calMese.y++;}
  if(CUR._calMese.m<0){CUR._calMese.m=11;CUR._calMese.y--;}
  pgCal(gi('MC'));
}

          const mS=calcM(vs), arr=[mO,mS].filter(x=>x!==null);
          const mF=arr.length?arr.reduce((s,x)=>s+x,0)/arr.length:null;
          return `<tr>
            <td style="font-weight:700">${a.n}. ${a.nome}</td>
            <td style="text-align:center;font-weight:900">${fmtM(mO)}</td>
            <td style="text-align:center;font-weight:900">${fmtM(mS)}</td>
            <td style="text-align:center;font-weight:900">${fmtM(mF)}</td>
            <td style="text-align:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:17px">${mF!==null?vL(rndV(mF)):'—'}</td>
            <td><input type="text" style="width:100%;padding:5px 8px;border:1px solid var(--gyl);border-radius:5px;font-size:12px" placeholder="Note..."></td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>
    `,`<button class="btn bo" onclick="closeM()">Chiudi</button>`);
  }
  else if(type==='editProfilo'){
    h=mk('✏️ Modifica Profilo',`
      <div class="fg2"><label>Nome completo</label><input type="text" id="mnome" value="${CUR.nome}"></div>
      <div class="fg2"><label>Scuola</label><input type="text" id="mscuola" value="${CUR.scuola}"></div>
      <div class="fg2"><label>Materia</label><input type="text" id="mmat" value="${CUR.materia}"></div>
    `,`<button class="btn bo" onclick="closeM()">Annulla</button><button class="btn bt" onclick="saveProfilo()">💾 Salva</button>`);
  }
  else if(type==='cambiaPass'){
    h=mk('🔑 Cambia Password',`
      <div class="fg2"><label>Password attuale</label><input type="password" id="mold"></div>
      <div class="fg2"><label>Nuova password</label><input type="password" id="mnew"></div>
      <div class="fg2"><label>Conferma</label><input type="password" id="mconf"></div>
    `,`<button class="btn bo" onclick="closeM()">Annulla</button><button class="btn bt" onclick="savePass()">🔑 Cambia</button>`);
  }

  gi('MW').innerHTML=h;
}

function mk(title,sizeOrBody,bodyOrFtr,ftrOrNone){
  let size='', body, ftr;
  if(sizeOrBody==='lg'){ size='mlg'; body=bodyOrFtr; ftr=ftrOrNone; }
  else { body=sizeOrBody; ftr=bodyOrFtr; }
  return `<div class="mov" onclick="ovClose(event)"><div class="modal ${size}">
    <div class="mhdr"><h3>${title}</h3><button class="mx" onclick="closeM()">✕</button></div>
    <div class="mbody">${body}</div>
    <div class="mftr">${ftr||''}</div>
  </div></div>`;
}
function ovClose(e){ if(e.target.classList.contains('mov')) closeM(); }
function closeM(){ gi('MW').innerHTML=''; }
function spTab(el,pid){
  document.querySelectorAll('.tbi').forEach(t=>t.classList.remove('act')); el.classList.add('act');
  ['tsp0','tsp1','tsp2','tsp3'].forEach(id=>{ const e=gi(id); if(e) e.classList.toggle('hidden',id!==pid); });
}

function saveOra(cid,aid,tipo,data){

  if(tipo==='ing'){ ap.ingresso=orario; if(ap.stato==='P') ap.stato='R'; }

function clearOrario(cid,key){ if(D().orario[cid]) delete D().orario[cid][key]; toast('Cancellato'); pgOr(gi('MC')); }
function saveClasse(eid){
  const nome=gv('mnome').toUpperCase(), mat=gv('mmat'), sede=gv('msede');
  if(!nome||!mat){ toast('Inserisci nome e materia.',true); return; }
  const altreM=gv('maltreM').split('\n').map(s=>s.trim()).filter(Boolean);
  const maxProve=parseInt(gi('mmaxProve')?.value||'0',10)||0;
  const maxOra=parseInt(gi('mmaxOra')?.value||'0',10)||0;
  if(eid){ const cls=D().classi.find(x=>x.id===eid); if(cls){cls.nome=nome;cls.materia=mat;cls.sede=sede;cls.altreMaterie=altreM;cls.maxProve=maxProve;cls.maxOra=maxOra;} }
  else { if(D().classi.find(x=>x.id===nome)){ toast('Classe già esistente.',true); return; } D().classi.push({id:nome,nome,materia:mat,sede,altreMaterie:altreM,maxProve,maxOra}); }
  closeM(); toast('Classe salvata ✅'); pgCls(gi('MC'));
}
function delClasse(id){
  if(!confirm('Eliminare questa classe e tutti i suoi dati?')) return;
  CUR.data.classi=D().classi.filter(x=>x.id!==id);
  CUR.data.alunni=D().alunni.filter(x=>x.classeId!==id);
  CUR.data.votiOrali=D().votiOrali.filter(x=>x.classeId!==id);
  CUR.data.verifiche=D().verifiche.filter(x=>x.classeId!==id);
  CUR.data.appello=D().appello.filter(x=>x.cid!==id);
  CUR.data.compiti=D().compiti.filter(x=>x.classeId!==id);
  CUR.data.note=D().note.filter(x=>x.cid!==id);
  CUR.data.programma=D().programma.filter(x=>x.classeId!==id);
  if(D().orario[id]) delete CUR.data.orario[id];
  toast('Classe eliminata'); pgCls(gi('MC'));
}
function saveAlunni(cid){
  const raw=gv('malunni');
  const nomi=raw.split('\n').map(l=>l.trim().toUpperCase()).filter(Boolean);
  if(!nomi.length){ toast('Inserisci almeno un nome.',true); return; }
  let added=0;
  nomi.forEach(nm=>{ if(!D().alunni.find(a=>a.nome===nm&&a.classeId===cid)){ D().alunni.push({id:'a'+Date.now()+Math.random(),classeId:cid,nome:nm,n:0}); added++; } });
  rinumera(cid); closeM(); toast(`${added} alunni aggiunti ✅`); pgCls(gi('MC'));
}
function delAlunno(id,cid){
  if(!confirm('Eliminare questo alunno e tutti i suoi dati?')) return;
  CUR.data.alunni=D().alunni.filter(x=>x.id!==id);
  CUR.data.votiOrali=D().votiOrali.filter(x=>x.aid!==id);
  CUR.data.appello=D().appello.filter(x=>x.aid!==id);
  CUR.data.note=D().note.filter(x=>x.aid!==id);
  D().verifiche.forEach(v=>{ if(v.voti&&v.voti[id]) delete v.voti[id]; });
  rinumera(cid); toast('Alunno eliminato'); pgCls(gi('MC'));
}
function rinumera(cid){
  const al=D().alunni.filter(a=>a.classeId===cid).sort((a,b)=>a.nome.localeCompare(b.nome,'it'));
  al.forEach((a,i)=>a.n=i+1);
}
function saveMsg(){
  const t=gv('ma'); if(!t){ toast('Inserisci il testo.',true); return; }
  D().bacheca.unshift({id:'b'+Date.now(),data:fmtD(td()),cat:gi('mcat')?.value||'DOCUMENTI',num:gv('mnum'),msg:t,autore:CUR.nome,letto:false});
  closeM(); toast('Pubblicato ✅'); pgBach(gi('MC'));
}
function saveEvento(){
  const t=gv('ma'); if(!t){ toast('Inserisci una descrizione.',true); return; }
  const tipo=gi('mtipo')?.value||'promemoria';
  const cols={annotazione:'#e85d5d',promemoria:'#2eaab1',personale:'#f5a623',compiti:'#27ae60'};
  D().eventi.push({id:'e'+Date.now(),data:fmtD(gv('md')),tipo,testo:t,col:cols[tipo]||'#2eaab1'});
  closeM(); toast('Evento aggiunto ✅'); pgCal(gi('MC'));
}
function saveEventoClasse(){
  const t=gv('ma'); if(!t){ toast('Inserisci una descrizione.',true); return; }
  const tipo=gi('mtipo')?.value||'verifica';
  const clsId=gi('mclsId')?.value;
  const cls=D().classi.find(x=>x.id===clsId);
  const cols={verifica:'#8e44ad',interrogazione:'#2980b9',consegna:'#27ae60',annotazione:'#e85d5d',promemoria:'#2eaab1'};
  D().eventi.push({id:'e'+Date.now(),data:fmtD(gv('md')),tipo,testo:t,col:cols[tipo]||'#8e44ad',clsId,clsNome:cls?.nome});
  closeM(); toast('Evento classe aggiunto ✅'); pgCal(gi('MC'));
}
function saveEditEvento(eid){
  const ev=D().eventi.find(x=>x.id===eid); if(!ev){ closeM(); return; }
  const tipo=gi('mtipo')?.value||ev.tipo;
  const cols={annotazione:'#e85d5d',promemoria:'#2eaab1',personale:'#f5a623',compiti:'#27ae60',verifica:'#8e44ad',interrogazione:'#2980b9',consegna:'#27ae60'};
  ev.data=fmtD(gv('md')); ev.tipo=tipo; ev.testo=gv('ma')||ev.testo; ev.col=cols[tipo]||ev.col;
  const newCls=gi('mclsId')?.value;
  if(newCls){ const cls=D().classi.find(x=>x.id===newCls); ev.clsId=newCls; ev.clsNome=cls?.nome; }
  closeM(); toast('Evento aggiornato ✅'); pgCal(gi('MC'));
}
function delEvento(eid){ CUR.data.eventi=D().eventi.filter(x=>x.id!==eid); closeM(); toast('Eliminato'); pgCal(gi('MC')); }
function saveProfilo(){
  const n=gv('mnome'), sc=gv('mscuola'), m=gv('mmat');
  if(!n||!sc||!m){ toast('Compila tutti i campi.',true); return; }
  CUR.nome=n; CUR.scuola=sc; CUR.materia=m;
  gi('hNm').textContent=n; gi('hSc').textContent=sc;
  gi('hAv').textContent=n.split(' ').map(x=>x[0]).slice(0,2).join('');
  saveLS(); closeM(); toast('Profilo aggiornato ✅');
}
function savePass(){
  const o=gi('mold')?.value, n=gi('mnew')?.value, c=gi('mconf')?.value;
  if(o!==CUR.password){ toast('Password attuale errata.',true); return; }
  if(n.length<6){ toast('Almeno 6 caratteri.',true); return; }
  if(n!==c){ toast('Le password non coincidono.',true); return; }
  CUR.password=n; saveLS(); closeM(); toast('Password cambiata 🔑');
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeM();
  if(e.key==='Enter' && !gi('LP').classList.contains('hidden')){
    if(!gi('RF').classList.contains('hidden')) doReg(); else doLogin();
  }
});
